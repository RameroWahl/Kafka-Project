apiVersion: batch/v1
kind: Job
metadata:
  name: producer-job
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: producer
          image: tracker:latest
          imagePullPolicy: Never
          env:
            - name: MODE
              value: "producer"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"