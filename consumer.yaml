apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
        - name: consumer
          image: your-image:latest
          imagePullPolicy: Never
          env:
            - name: MODE
              value: "consumer"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"